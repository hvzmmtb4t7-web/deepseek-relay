# Nginx rate limiting for DeepSeek Relay
# Include in your server block:
#   include /etc/nginx/conf.d/deepseek-relay-rate-limit.conf;

# Define rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $http_authorization zone=by_key:10m rate=50r/s;

# Apply to API endpoints
location /v1/chat/completions {
    # Per-IP burst protection
    limit_req zone=api burst=60 nodelay;
    # Per-key soft limit (log only, don't reject)
    limit_req zone=by_key burst=100;

    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;

    # CORS for browser-based clients
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'Authorization, Content-Type';
    if ($request_method = OPTIONS) { return 204; }
}
